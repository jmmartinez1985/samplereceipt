apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-invoice-reprocessor
  namespace: default
  labels:
    app: fe-invoice-reprocessor
    component: batch-processor
    version: v1.0.0
spec:
  replicas: 1  # Solo una instancia para evitar procesamiento duplicado
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: fe-invoice-reprocessor
  template:
    metadata:
      labels:
        app: fe-invoice-reprocessor
        component: batch-processor
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "false"  # No métricas por ahora
    spec:
      # Configuración de seguridad
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # Volúmenes
      volumes:
      - name: nfs-data
        persistentVolumeClaim:
          claimName: pvc-nfs-pv-fe-data
      - name: logs
        emptyDir: {}

      # Contenedor principal
      containers:
      - name: invoice-reprocessor
        image: soportehypernovalabs/fe-pac-reingest-bills:latest
        imagePullPolicy: Always

        # Configuración de recursos
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Montaje de volúmenes
        volumeMounts:
        - name: nfs-data
          mountPath: /nfs/general
          readOnly: true  # Solo lectura para seguridad
        - name: logs
          mountPath: /app/logs

        # Variables de entorno
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: NFS_BASE_PATH
          value: "/nfs/general"
        - name: NFS_FILE_EXTENSION
          value: ".txt"
        - name: NFS_DAYS_THRESHOLD
          value: "1"
        - name: PUBLISH_API_BASE_URL
          value: "http://fe-mq-publisher-service.default.svc.cluster.local"
        - name: PUBLISH_API_ENDPOINT
          value: "/publish/fe"
        - name: PUBLISH_API_TIMEOUT
          value: "30"
        - name: PUBLISH_API_RETRY_ATTEMPTS
          value: "3"
        - name: SCHEDULER_INTERVAL_MINUTES
          value: "30"
        - name: BATCH_SIZE
          value: "100"
        - name: DRY_RUN
          value: "false"

        # Configuración del contenedor
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Necesario para logs
          capabilities:
            drop:
            - ALL

        # Health checks
        livenessProbe:
          exec:
            command:
            - python
            - main.py
            - --health-check
          initialDelaySeconds: 60
          periodSeconds: 300  # 5 minutos
          timeoutSeconds: 30
          failureThreshold: 3

        readinessProbe:
          exec:
            command:
            - python
            - main.py
            - --health-check
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 2

        # Startup probe para primera inicialización
        startupProbe:
          exec:
            command:
            - python
            - main.py
            - --health-check
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 10

      # Configuración del Pod
      restartPolicy: Always
      terminationGracePeriodSeconds: 60  # Tiempo para shutdown graceful

      # Tolerancias para nodos (opcional)
      tolerations:
      - key: "batch-workload"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

      # Afinidad de nodos (opcional)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: workload-type
                operator: In
                values:
                - batch
                - general

